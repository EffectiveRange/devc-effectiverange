name: CI

on:
  pull_request:
    types:
      - synchronize
      - opened
      - reopened

jobs:
  check-apt-repository:
    uses: EffectiveRange/ci-workflows/.github/workflows/apt-repository-check.yaml@main

  test:
    runs-on: ubuntu-latest
    
    strategy:
        matrix:
          architecture: ["armhf", "amd64", "arm64"]
          distro: ["bookworm","trixie"]
    
    steps:
      - name: Check out the repo
        uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.9' 
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME  }}
          password: ${{ secrets.DOCKERHUB_TOKEN  }}
      - name: Run CI tests
        run: ${{github.workspace}}/test.sh ${{ matrix.architecture }} ${{ matrix.distro }}
